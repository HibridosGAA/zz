<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Anual</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #001029;
            --card-bg: #001d47;
            --btn-color: #0069e0;
            --btn-hover: #3d94ff;
            --text-main: #ffffff;
            --text-muted: #b9dcff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .btn-inicio {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 20px;
            border: 1px solid var(--text-muted);
            border-radius: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-inicio:hover {
            background-color: var(--text-muted);
            color: var(--bg-color);
        }

        .grid-meses {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .mes-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .mes-titulo {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--btn-hover);
            text-transform: uppercase;
        }

        .grid-semanas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-semana {
            background-color: var(--btn-color);
            color: white;
            text-decoration: none;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-semana:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <h1>AÑO ACADÉMICO</h1>
        <a href="index.html" class="btn-inicio">Volver al Inicio</a>
    </header>

    <div class="grid-meses" id="contenedor-meses">
        <!-- Los meses se generarán con JavaScript -->
    </div>

    <script>
        const meses = [
            "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
            "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];

        const contenedor = document.getElementById('contenedor-meses');

        meses.forEach((mes, index) => {
            const card = document.createElement('div');
            card.className = 'mes-card';
            
            let htmlSemanas = `<div class="mes-titulo">${mes}</div><div class="grid-semanas">`;
            
            // Creamos 4 semanas para cada mes
            for(let i = 1; i <= 4; i++) {
                // AQUÍ ESTÁ LA MAGIA: Pasamos el mes y la semana en la URL (?semana=enero-1)
                const idSemana = `${mes.toLowerCase()}-${i}`;
                htmlSemanas += `<a href="0.9.html?semana=${idSemana}" class="btn-semana">Semana ${i}</a>`;
            }
            
            htmlSemanas += `</div>`;
            card.innerHTML = htmlSemanas;
            contenedor.appendChild(card);
        });
    </script>
</body>
</html>
